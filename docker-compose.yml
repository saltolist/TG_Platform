name: tg_platform

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tg}
      POSTGRES_DB: ${POSTGRES_DB:-tg}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/scripts/docker-init-test-db.sh:/docker-entrypoint-initdb.d/02-create-test-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tg}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tg}:${POSTGRES_PASSWORD:-tg}@postgres:5432/${POSTGRES_DB:-tg}
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3020}
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY:-}
      BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY:-}
      RAG_ENABLED: ${RAG_ENABLED:-1}
      AI_CONTEXT_LOG: ${AI_CONTEXT_LOG:-0}
      AI_CONTEXT_LOG_CHAT: ${AI_CONTEXT_LOG_CHAT:-}
      AI_CONTEXT_STAMPS: ${AI_CONTEXT_STAMPS:-0}
      MEDIA_STORAGE_ROOT: /app/media
      MEDIA_PUBLIC_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      TELEGRAM_RPC_TIMEOUT_SECONDS: ${TELEGRAM_RPC_TIMEOUT_SECONDS:-60}
      TELEGRAM_LISTENER_STOP_TIMEOUT_SECONDS: ${TELEGRAM_LISTENER_STOP_TIMEOUT_SECONDS:-35}
      TELEGRAM_CLOCK_SYNC_ENABLED: ${TELEGRAM_CLOCK_SYNC_ENABLED:-1}
      # Live-sync needs a stable MTProto connection; disable in Docker if Telegram is unreachable.
      TELEGRAM_LIVE_SYNC_ENABLED: ${TELEGRAM_LIVE_SYNC_ENABLED:-0}
      TELEGRAM_LIVE_SYNC_REGISTRY_REFRESH_SECONDS: ${TELEGRAM_LIVE_SYNC_REGISTRY_REFRESH_SECONDS:-30}
      TELEGRAM_LIVE_SYNC_RECONNECT_SECONDS: ${TELEGRAM_LIVE_SYNC_RECONNECT_SECONDS:-15}
      TELEGRAM_ALBUM_DEBOUNCE_SECONDS: ${TELEGRAM_ALBUM_DEBOUNCE_SECONDS:-2}
      TELEGRAM_PROXY_TYPE: ${TELEGRAM_PROXY_TYPE:-}
      TELEGRAM_PROXY_HOST: ${TELEGRAM_PROXY_HOST:-}
      TELEGRAM_PROXY_PORT: ${TELEGRAM_PROXY_PORT:-0}
      TELEGRAM_PROXY_SECRET: ${TELEGRAM_PROXY_SECRET:-}
      TELEGRAM_PROXY_USERNAME: ${TELEGRAM_PROXY_USERNAME:-}
      TELEGRAM_PROXY_PASSWORD: ${TELEGRAM_PROXY_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media-data:/app/media
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_USE_MSW: "0"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
    name: tg_platform_postgres-data
  minio-data:
    name: tg_platform_minio-data
  media-data:
    name: tg_platform_media-data
