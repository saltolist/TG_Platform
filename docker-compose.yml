services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tg}
      POSTGRES_DB: ${POSTGRES_DB:-tg}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tg}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tg}:${POSTGRES_PASSWORD:-tg}@postgres:5432/${POSTGRES_DB:-tg}
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  product:
    build:
      context: .
      dockerfile: apps/product/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_USE_MSW: "0"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:
